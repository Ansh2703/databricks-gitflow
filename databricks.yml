# Declarative Automation Bundle configuration for GitFlow Demo
# More info: https://docs.databricks.com/en/dev-tools/bundles/settings.html

bundle:
  name: "gitflow"

# Include all resource definitions
include:
  - resources/*.yml
  - resources/*/*.yml

# Variables used across all targets
variables:
  catalog:
    description: "Unity Catalog name for the environment"
  schema:
    description: "Schema name for the environment"

targets:
  # Development environment - deploys on merge to 'develop' branch
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-68f6c19e-2b48.cloud.databricks.com
    
    # Dev-specific variables
    variables:
      catalog: gitflow
      schema: gitflow_dev
  
  # Staging environment - deploys on merge to 'release/*' branches
  staging:
    mode: production
    workspace:
      host: https://dbc-68f6c19e-2b48.cloud.databricks.com
      root_path: /Users/mybeats320@gmail.com/.bundle/${bundle.name}/${bundle.target}
    
    # Staging-specific variables
    variables:
      catalog: gitflow
      schema: gitflow_staging
    
    run_as:
      user_name: mybeats320@gmail.com

  # Production environment - deploys on merge to 'main' branch
  prod:
    mode: production
    workspace:
      host: https://dbc-68f6c19e-2b48.cloud.databricks.com
      root_path: /Users/mybeats320@gmail.com/.bundle/${bundle.name}/${bundle.target}
    
    # Production-specific variables
    variables:
      catalog: gitflow
      schema: gitflow_prod
    
    run_as:
      # This runs as mybeats320@gmail.com in production. 
      # Could also use a service principal for production deployments
      # See: https://docs.databricks.com/dev-tools/bundles/permissions.html
      user_name: mybeats320@gmail.com
